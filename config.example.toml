# Copy to ~/.config/dotfiles-ai/chezmoi.toml and replace /Users/you.
# This file is chezmoi configuration, not an application secret store.
sourceDir = "/Users/you/.local/share/chezmoi-dotfiles-ai"
persistentState = "/Users/you/.config/dotfiles-ai/chezmoi.boltdb"

[data.dotfiles_ai.opencode]
bedrock_region = "us-west-2"
bedrock_profile = ""
default_model = "openai/gpt-5.6-sol"
small_model = "openai/gpt-5.6-terra"
lmstudio_base_url = "http://127.0.0.1:1234/v1"
# Optional local repository exposed to OpenCode as the seo-data-science reference.
seo_data_science_path = "/Users/you/path/to/seo-data-science"

[data.dotfiles_ai.herdr]
theme = "catppuccin"
launchagent = true
executable = "/opt/homebrew/bin/herdr"

[data.dotfiles_ai.rnd]
# Keep false on machines that should not schedule autonomous review workers.
enabled = false
review_workdir = "/Users/you/.local/share/chezmoi-dotfiles-ai"
review_hour = 9
review_minute = 0
watchdog_interval_seconds = 300
# Herdr holds one managed workspace with a fresh OpenCode tab per scheduled run.
workspace_label = "DBSCTR R&D"
# Non-secret gh account name used for this source's draft pull requests.
github_account = "your-account"
github_repository = "your-account/dotfiles-ai"

[data.dotfiles_ai.onepassword]
# Enable only when `op` is installed and the account-specific values are set.
enabled = false
account = ""
user_uuid = ""
keychain_service = "op-service-account-token"
