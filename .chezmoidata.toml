[dotfiles_ai.opencode]
bedrock_region = "us-west-2"
bedrock_profile = ""
default_model = "openai/gpt-5.6-sol"
small_model = "openai/gpt-5.6-terra"
lmstudio_base_url = "http://127.0.0.1:1234/v1"

[dotfiles_ai.herdr]
theme = "catppuccin"
launchagent = true
executable = "/opt/homebrew/bin/herdr"

[dotfiles_ai.hermes]
enabled = false
executable = "~/.local/bin/hermes"
provider = "openai-codex"
model = "gpt-5.5"
review_workdir = ""
review_schedule = "0 9 * * *"
watchdog_schedule = "every 5m"
review_delivery = "local"
review_session_id = ""
workspace_label = "DBSCTR R&D"
github_account = ""
github_repository = ""
update_weekday = 0
update_hour = 4
repositories = []

[dotfiles_ai.onepassword]
enabled = false
account = ""
user_uuid = ""
keychain_service = "op-service-account-token"
